<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - 页面走丢了</title>
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background-color:#FDFBF7;
  background-image:radial-gradient(at 0% 0%,rgba(226,232,220,0.3) 0px,transparent 50%),radial-gradient(at 100% 100%,rgba(242,230,224,0.3) 0px,transparent 50%);
  color:#3D3429;
  font-family:'Varela Round','ZCOOL QingKe HuangYou','PingFang SC','Microsoft YaHei',sans-serif;
  letter-spacing:0.04em;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.card{background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);border:2px solid rgba(255,255,255,0.9);box-shadow:0 8px 32px rgba(0,0,0,0.04);border-radius:2.5rem;padding:48px;text-align:center;max-width:480px}
.title{font-family:'ZCOOL QingKe HuangYou','Varela Round',sans-serif;font-weight:400}
.big{font-size:8rem;line-height:1;color:#C4956A;margin-bottom:8px;opacity:0.3}
.subtitle{font-size:1.5rem;margin-bottom:12px;color:#3D3429}
.desc{font-size:1rem;color:#86909c;margin-bottom:32px;line-height:1.6}
.btn{display:inline-block;padding:12px 28px;border-radius:999px;font-weight:700;border:2px solid #5C4F42;color:#5C4F42;text-decoration:none;font-family:inherit;font-size:.9rem;transition:all 0.3s ease;letter-spacing:0.05em;background:transparent}
.btn:hover{background:#5C4F42;color:#fff}
.orb{position:absolute;width:120px;height:120px;border-radius:50%;background:linear-gradient(135deg,rgba(196,149,106,0.15),rgba(122,158,119,0.15));filter:blur(40px);animation:float 6s ease-in-out infinite}
.orb-1{top:-40px;left:-30px}.orb-2{bottom:-40px;right:-30px;animation-delay:-3s}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.emoji{font-size:4rem;margin-bottom:16px;display:block;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<div class="card" style="position:relative;overflow:hidden">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <span class="emoji">🧭</span>
  <div class="big title">404</div>
  <div class="subtitle title">页面走丢了</div>
  <div class="desc">你访问的页面可能已被移动、删除，或者从未存在过。<br>别担心，迷路也是一种探索。</div>
  <a href="/" class="btn">← 回到首页</a>
</div>
</body>
</html>
